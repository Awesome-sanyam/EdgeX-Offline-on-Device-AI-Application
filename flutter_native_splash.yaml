flutter_native_splash:
  # Dark, premium background matching the app's accent palette
  color: "#0F172A"
  image: assets/images/logo.png
  color_dark: "#0F172A"
  image_dark: assets/images/logo.png
  
  # Ensure the logo is centered and padded properly
  android_gravity: center
  ios_content_mode: scaleAspectFit
  
  android: true
  ios: true
  web: false

  android_12:
    # Android 12+ adaptive splash with icon background
    color: "#0F172A"
    image: assets/images/logo.png
    icon_background_color: "#1A1033"
    color_dark: "#0F172A"
    image_dark: assets/images/logo.png
    icon_background_color_dark: "#1A1033"