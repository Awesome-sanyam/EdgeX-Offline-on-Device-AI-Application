name: loc_ai
description: "EdgeX — A fully offline, on-device AI inference app. Run LLMs privately on your phone with zero cloud dependency."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ffi: ^2.2.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  lucide_icons: ^0.257.0
  file_picker: ^8.0.0
  flutter_native_splash: ^2.4.0
  flutter_markdown: ^0.7.7+1
  markdown: ^7.2.2
  dynamic_color: ^1.8.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  device_info_plus: ^10.1.0
  system_info_plus: ^0.0.6
  flutter_highlighter: ^0.1.1
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  dio: ^5.9.2
  path_provider: ^2.1.5
  background_downloader: ^9.5.4
  syncfusion_flutter_pdf: ^24.2.9
  fllama:
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
